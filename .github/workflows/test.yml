name: Tests

on:
  push:
    paths:
      - 'new-torrents.py'
      - 'tests/test_new_torrents.py'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'new-torrents.py'
      - 'tests/test_new_torrents.py'
      - '.github/workflows/test.yml'

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 tests/test_new_torrents.py -v

  almalinux:
    runs-on: ubuntu-latest
    container: almalinux:10
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y python3
      - run: python3 tests/test_new_torrents.py -v
